name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Quality (Lint, Format, Typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run linter
        run: uv run ruff check .

      - name: Run formatter
        run: uv run ruff format --check --diff

      - name: Run type checker
        run: uv run ty check

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Set up database
        run: mkdir -p data/db && cd db && SIFTARR_DB_PATH=../data/db/siftarr.db uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          build-args: |
            SIFTARR_VERSION=0.0.0
