<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <title>{% block title %}Siftarr{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eef6ff',
                            100: '#d9eaff',
                            200: '#bbd8ff',
                            300: '#8cbeff',
                            400: '#5599ff',
                            500: '#2e73fc',
                            600: '#1854f1',
                            700: '#103fde',
                            800: '#1434b4',
                            900: '#16308e',
                            950: '#111f56',
                        },
                        surface: {
                            DEFAULT: '#0f1117',
                            50:  '#f6f7f9',
                            100: '#eceef2',
                            200: '#d5d8e2',
                            800: '#1a1d27',
                            850: '#151720',
                            900: '#0f1117',
                            950: '#0a0b0f',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans antialiased;
            }
        }
        @layer components {
            .card {
                @apply bg-surface-800 rounded-xl border border-gray-700/60 shadow-sm;
            }
            .card-header {
                @apply px-5 py-4 border-b border-gray-700/60;
            }
            .card-body {
                @apply p-5;
            }
            .btn {
                @apply inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-medium transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface-900 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .btn-primary {
                @apply btn bg-brand-600 text-white hover:bg-brand-500 focus:ring-brand-500;
            }
            .btn-success {
                @apply btn bg-emerald-600 text-white hover:bg-emerald-500 focus:ring-emerald-500;
            }
            .btn-danger {
                @apply btn bg-red-600 text-white hover:bg-red-500 focus:ring-red-500;
            }
            .btn-warning {
                @apply btn bg-amber-600 text-white hover:bg-amber-500 focus:ring-amber-500;
            }
            .btn-ghost {
                @apply btn bg-gray-700/50 text-gray-300 hover:bg-gray-700 hover:text-white focus:ring-gray-500;
            }
            .btn-sm {
                @apply px-3 py-1.5 text-xs;
            }
            .form-input {
                @apply w-full rounded-lg border border-gray-600/80 bg-surface-850 px-3.5 py-2 text-sm text-white placeholder-gray-500 transition-colors focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500;
            }
            .form-select {
                @apply form-input appearance-none;
            }
            .form-label {
                @apply block text-xs font-medium uppercase tracking-wider text-gray-400 mb-1.5;
            }
            .badge {
                @apply inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium;
            }
            .badge-green  { @apply bg-emerald-900/60 text-emerald-300 ring-1 ring-inset ring-emerald-700/40; }
            .badge-yellow { @apply bg-amber-900/60 text-amber-300 ring-1 ring-inset ring-amber-700/40; }
            .badge-blue   { @apply bg-blue-900/60 text-blue-300 ring-1 ring-inset ring-blue-700/40; }
            .badge-red    { @apply bg-red-900/60 text-red-300 ring-1 ring-inset ring-red-700/40; }
            .badge-gray   { @apply bg-gray-700/60 text-gray-300 ring-1 ring-inset ring-gray-600/40; }
            .badge-purple { @apply bg-purple-900/60 text-purple-300 ring-1 ring-inset ring-purple-700/40; }
            .badge-cyan   { @apply bg-cyan-900/60 text-cyan-300 ring-1 ring-inset ring-cyan-700/40; }
            .page-title {
                @apply text-2xl font-bold tracking-tight text-white;
            }
            .section-title {
                @apply text-lg font-semibold text-white;
            }
            .section-subtitle {
                @apply text-sm text-gray-400 mt-0.5;
            }
        }
    </style>
</head>
<body class="bg-surface-900 text-gray-200 min-h-screen flex flex-col">
    <nav class="sticky top-0 z-40 bg-surface-800/80 border-b border-gray-700/60 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-8">
                    <a href="/" class="flex items-center gap-2.5 group">
                        <img src="/static/favicon-32.png" alt="" class="h-7 w-7 rounded-lg transition-transform group-hover:scale-105">
                        <span class="text-lg font-bold text-white tracking-tight">Siftarr</span>
                    </a>
                    <div class="hidden md:flex items-center gap-1">
                        {% set current_path = request.url.path if request else '/' %}
                        <a href="/"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors {{ 'bg-gray-700/60 text-white' if current_path == '/' else 'text-gray-400 hover:text-white hover:bg-gray-700/40' }}">
                            Dashboard
                        </a>
                        <a href="/rules"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors {{ 'bg-gray-700/60 text-white' if current_path.startswith('/rules') else 'text-gray-400 hover:text-white hover:bg-gray-700/40' }}">
                            Rules
                        </a>
                        <a href="/settings"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors {{ 'bg-gray-700/60 text-white' if current_path.startswith('/settings') else 'text-gray-400 hover:text-white hover:bg-gray-700/40' }}">
                            Settings
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% if message %}
        <div class="mb-6 flex items-start gap-3 rounded-xl p-4 text-sm {% if message_type == 'error' %}bg-red-900/40 border border-red-700/50 text-red-200{% elif message_type == 'success' %}bg-emerald-900/40 border border-emerald-700/50 text-emerald-200{% else %}bg-blue-900/40 border border-blue-700/50 text-blue-200{% endif %}">
            <span>{{ message }}</span>
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-800/60 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <p class="text-center text-gray-600 text-xs tracking-wide">
                Siftarr &middot; Media search and download decision middleware
            </p>
        </div>
    </footer>
</body>
</html>
